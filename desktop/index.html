<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FL Radar — пульт</title>
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/pult.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app" class="app">
      <header class="app__header">
        <h1 class="app__title">FL RADAR</h1>
        <button type="button" class="btn-refresh" id="btn-refresh">
          Обновить статус
        </button>
      </header>

      <main class="app__main">
        <div class="hero-wrap">
          <button
            type="button"
            class="hero hero--play"
            id="hero-btn"
            aria-label="Запуск"
          >
            <svg
              class="hero__icon hero__icon--play"
              width="128"
              height="128"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path d="M8 5.5v13l12-6.5z" fill="currentColor" />
            </svg>
            <svg
              class="hero__icon hero__icon--stop"
              width="96"
              height="96"
              viewBox="0 0 24 24"
              aria-hidden="true"
              hidden
            >
              <rect
                x="7"
                y="7"
                width="10"
                height="10"
                rx="1.5"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>

        <div class="lamps" id="lamps" aria-live="polite"></div>

        <section class="log-panel" id="log-panel" hidden>
          <div class="log-panel__head">
            <button
              type="button"
              class="btn-collapse"
              id="btn-collapse"
              aria-label="Свернуть логи"
              title="Свернуть логи"
            >
              <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
                <path
                  id="collapse-path"
                  d="M2 3 L5 7 L8 3 Z"
                  fill="#ffffff"
                />
              </svg>
            </button>
          </div>
          <div class="log-panel__body" id="log-body">
            <div class="log-tabs" role="tablist">
              <button
                type="button"
                class="log-tab log-tab--active"
                data-tab="radar.log"
                role="tab"
                aria-selected="true"
              >
                radar.log
              </button>
              <button
                type="button"
                class="log-tab"
                data-tab="tg_join.log"
                role="tab"
                aria-selected="false"
              >
                tg_join.log
              </button>
              <button
                type="button"
                class="log-tab"
                data-tab="status"
                role="tab"
                aria-selected="false"
              >
                Статус
              </button>
            </div>
            <pre class="log-view" id="log-view" role="log"></pre>
          </div>
        </section>
      </main>

      <footer class="app__footer">
        <p class="signature">by Rode51</p>
      </footer>
    </div>
  </body>
</html>
