<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RawLead — пульт</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Unbounded:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/pult.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app" class="app">
      <header class="app__header">
        <h1 class="app__title" data-tauri-drag-region>RawLead</h1>
        <div class="window-controls" aria-label="Окно">
          <button
            type="button"
            class="win-btn"
            id="btn-minimize"
            aria-label="Свернуть"
            title="Свернуть"
          >
            —
          </button>
          <button
            type="button"
            class="win-btn win-btn--close"
            id="btn-close"
            aria-label="Закрыть"
            title="Закрыть"
          >
            ✕
          </button>
        </div>
      </header>

      <div id="status-banner" class="status-banner" hidden role="alert"></div>

      <main class="app__main">
        <div class="hero-wrap">
          <button
            type="button"
            class="hero hero--play"
            id="hero-btn"
            aria-label="Запуск"
          >
            <svg
              class="hero__icon hero__icon--play"
              width="128"
              height="128"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path d="M8 5.5v13l12-6.5z" fill="currentColor" />
            </svg>
            <svg
              class="hero__icon hero__icon--stop"
              width="96"
              height="96"
              viewBox="0 0 24 24"
              aria-hidden="true"
              hidden=""
            >
              <rect
                x="7"
                y="7"
                width="10"
                height="10"
                rx="1.5"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>

        <div class="lamps" id="lamps" aria-live="polite"></div>
      </main>

      <section class="log-panel" id="log-panel" hidden>
        <div class="log-panel__body" id="log-body">
          <div class="log-tabs" role="tablist">
            <button
              type="button"
              class="log-tab log-tab--active"
              data-tab="radar.log"
              role="tab"
              aria-selected="true"
            >
              radar.log
            </button>
            <button
              type="button"
              class="log-tab"
              data-tab="tg_join.log"
              role="tab"
              aria-selected="false"
            >
              tg_join.log
            </button>
            <button
              type="button"
              class="log-tab"
              data-tab="status"
              role="tab"
              aria-selected="false"
            >
              Статус
            </button>
          </div>
          <pre class="log-view" id="log-view" role="log"></pre>
        </div>
      </section>

      <footer class="app__footer">
        <button
          type="button"
          class="btn-collapse"
          id="btn-collapse"
          aria-label="Развернуть логи"
          title="Развернуть логи"
        >
          <svg width="12" height="12" viewBox="0 0 10 10" aria-hidden="true">
            <path id="collapse-path" d="M2 3 L5 7 L8 3 Z" fill="currentColor" />
          </svg>
        </button>
        <p class="signature">by Rode51</p>
      </footer>
    </div>
  </body>
</html>
