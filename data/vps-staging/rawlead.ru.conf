server {
    server_name rawlead.ru www.rawlead.ru;
    root /var/www/rawlead.ru;
    index index.php index.html;
    client_max_body_size 32M;

    location /ops/ {
        proxy_pass http://127.0.0.1:8000/ops/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /v1/admin/ {
        proxy_pass http://127.0.0.1:8000/v1/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    }
    location ~ /\.ht { deny all; }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rawlead.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rawlead.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.rawlead.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = rawlead.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name rawlead.ru www.rawlead.ru;
    return 404; # managed by Certbot
}
