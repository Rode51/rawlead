# RawLead API — reverse proxy. TLS: certbot.
# Скопировать: sudo ln -sf /opt/rawlead/deploy/nginx/api.rawlead.ru.conf /etc/nginx/sites-enabled/
# Проверка: sudo nginx -t && sudo systemctl reload nginx
# Cert: sudo certbot --nginx -d api.rawlead.ru

server {
    listen 80;
    listen [::]:80;
    server_name api.rawlead.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rawlead.ru;

    ssl_certificate     /etc/letsencrypt/live/api.rawlead.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rawlead.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
