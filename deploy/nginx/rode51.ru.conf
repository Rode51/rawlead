# Rode51 portfolio — static Next export. TLS: certbot.
# sudo mkdir -p /var/www/rode51.ru
# sudo ln -sf /opt/rawlead/deploy/nginx/rode51.ru.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d rode51.ru -d www.rode51.ru

server {
    listen 80;
    listen [::]:80;
    server_name rode51.ru www.rode51.ru;

    root /var/www/rode51.ru;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /_next/static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

