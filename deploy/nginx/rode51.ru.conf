# Rode51 portfolio — static Next export. TLS: certbot.
# sudo mkdir -p /var/www/rode51.ru
# sudo ln -sf /opt/rawlead/deploy/nginx/rode51.ru.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# cert: /etc/letsencrypt/live/rode51.ru/

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rode51.ru www.rode51.ru;

    ssl_certificate     /etc/letsencrypt/live/rode51.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rode51.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/rode51.ru;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /_next/static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name rode51.ru www.rode51.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
