# rawlead.ru — Next.js static export (O280 cutover)
# Keep Certbot SSL + /ops/ + /v1/admin/ from prod WP era.
# Rollback: restore /var/www/rawlead.ru-wp → /var/www/rawlead.ru · WP nginx block in DEPLOY_VPS.md

server {
    server_name rawlead.ru www.rawlead.ru;

    root /var/www/rawlead.ru;
    index index.html;

    client_max_body_size 32M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /ops/ {
        proxy_pass http://127.0.0.1:8000/ops/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/admin/ {
        proxy_pass http://127.0.0.1:8000/v1/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~ /\.ht {
        deny all;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/rawlead.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rawlead.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name rawlead.ru www.rawlead.ru;
    return 301 https://$host$request_uri;
}
