<h2 id="contact">Связаться с нами</h2>
<p>Напишите нам — в Telegram или через форму ниже (отправка скоро).</p>
<p>Telegram: <a href="https://t.me/rcnn43" target="_blank" rel="noopener"><strong>@rcnn43</strong></a></p>
<form class="rl-contact-form" action="#" method="post" onsubmit="return false;" aria-label="Форма обратной связи">
	<p>
		<label for="rl-contact-name">Имя</label><br>
		<input type="text" id="rl-contact-name" name="name" autocomplete="name" placeholder="Как к вам обращаться">
	</p>
	<p>
		<label for="rl-contact-tg">Telegram @username</label><br>
		<input type="text" id="rl-contact-tg" name="telegram" autocomplete="username" placeholder="@username">
	</p>
	<p>
		<label for="rl-contact-niche">Чем занимаетесь</label><br>
		<select id="rl-contact-niche" name="niche">
			<option value="">Выберите…</option>
			<option value="design">Дизайн</option>
			<option value="text">Тексты</option>
			<option value="marketing">Маркетинг</option>
			<option value="dev">Разработка</option>
			<option value="other">Другое</option>
		</select>
	</p>
	<p>
		<label for="rl-contact-msg">Сообщение</label><br>
		<textarea id="rl-contact-msg" name="message" rows="4" placeholder="Вопрос или предложение"></textarea>
	</p>
	<p><button type="submit" class="rl-btn rl-btn--primary" disabled>Отправить — скоро</button></p>
	<p class="rl-contact-form__hint">Пока форма не отправляет данные. Напишите напрямую → <a href="https://t.me/rcnn43" target="_blank" rel="noopener">@rcnn43</a> в Telegram.</p>
</form>
